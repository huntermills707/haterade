# ServiceMonitor so Prometheus scrapes Triton metrics from the canary Rollout.
#
# Mirrors serving/cpu/triton-servicemonitor.yaml but selects the canary Service.
# Without this, Argo Rollouts AnalysisRuns against canary-specific Prometheus
# queries have no data and the canary will fail.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: triton-cpu-canary-metrics
  namespace: default
  labels:
    release: kube-prometheus-stack   # matched by kube-prometheus-stack discovery
spec:
  selector:
    matchLabels:
      app: isvc.toxicity-cpu-canary
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
