# KServe InferenceService: DistilBERT toxicity classifier on Triton + ONNX.
#
# Topology: PVC (model.onnx) → Triton (ONNX backend) → KServe V2 protocol.
# RawDeployment mode + KEDA annotations (M3) for autoscaling 1 → N → 1.
#
# Mirrors serving/gpu/inferenceservice-triton.yaml in shape. Differences:
#   - Backend: onnx (vs tensorrt)
#   - Model file: model.onnx (vs model.plan)
#   - No GPU resources, no GPU nodeSelector
#   - Instance group: KIND_CPU (vs KIND_GPU)
#
# Pre-tokenized input contract (same as GPU):
#   POST /v2/models/distilbert-toxicity/infer
#   inputs: [{name: input_ids, [B,128] INT64}, {name: attention_mask, [B,128] INT64}]
#   output:  single {name: logits, [B,6] FP32} tensor
#
# Labels order (DO NOT reorder — M1 training + serving/gpu both depend on this):
#   toxic, severe_toxic, obscene, threat, insult, identity_hate
# Apply sigmoid client-side (multi-label, not multi-class).
#
# The ONNX model is exported from MLflow run 4927d59563184da6a5861765de043394
# via serving/cpu/build-model-repo.sh. M5 (retrain + automated promotion) will
# produce a new run_id; re-run the build script + redeploy.
#
# Companion VirtualService: see the second document at the bottom of this
# file. KServe v0.19 RawDeployment creates a K8s Ingress, but our istio-ingress
# proxy only serves Gateway CRD resources. See README "Known limitations."
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: toxicity-cpu
  namespace: default
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/autoscalerClass: keda
spec:
  predictor:
    # ADR 0007: true scale-to-zero is out of scope for RawDeployment M3.
    # Serverless/Knative is the right place for that capability. We keep one
    # replica as the floor so KEDA's pod-level Triton metric always exists and
    # can scale 1 -> N -> 1 under load.
    minReplicas: 1
    maxReplicas: 3
    containers:
      - name: kserve-container
        image: nvcr.io/nvidia/tritonserver:23.05-py3
        imagePullPolicy: IfNotPresent
        command: ["tritonserver"]
        args:
          - --model-repository=/mnt/models
          - --http-port=8080
          - --grpc-port=9000
          - --metrics-port=8002
          - --allow-grpc=true
          - --allow-http=true
          - --allow-metrics=true
        resources:
          # DistilBERT ONNX on CPU needs ~1.5 GiB resident. 2 GiB requests
          # with 4 GiB limits gives headroom for batching + transient tensors.
          requests: {cpu: "1",   memory: 2Gi}
          limits:   {cpu: "2",   memory: 4Gi}
        ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          - containerPort: 9000
            name: grpc
            protocol: TCP
          - containerPort: 8002
            name: metrics
            protocol: TCP
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
          - name: model-repo
            mountPath: /mnt/models
            readOnly: true
    volumes:
      - name: model-repo
        persistentVolumeClaim:
          claimName: triton-cpu-model-repo
    autoScaling:
      behavior:
        # Shorten the scale-down stabilization window so the M3 demo can observe
        # scale-back-to-minimum in ~1 minute instead of KEDA's default 5 minutes.
        scaleDown:
          stabilizationWindowSeconds: 60
      metrics:
        # Trigger — Triton inference queue duration per pod (microseconds/s).
        # When average queue pressure per pod exceeds 50ms/s, KEDA scales up.
        # When traffic stops and the queue drains, KEDA scales back down to
        # minReplicas after the cooldown.
        #
        # NOTE (ADR 0007): this is a pod-level metric. We keep minReplicas=1
        # so the metric is always available; true scale-to-zero would require
        # an ingress-level trigger or Serverless mode.
        - type: External
          external:
            metric:
              backend: prometheus
              serverAddress: http://kube-prometheus-stack-prometheus.observability.svc:9090
              query: >
                avg(rate(nv_inference_queue_duration_us{model="distilbert-toxicity"}[30s]))
            target:
              type: Value
              value: "50000"
---
# VirtualService — same pattern as the previous MLServer ISVC.
# See serving/cpu/README.md "Routing" section for details.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: toxicity-cpu
  namespace: default
spec:
  gateways:
    - kserve/kserve-ingress-gateway
  hosts:
    - toxicity-cpu-default.example.com
  http:
    - route:
        - destination:
            host: toxicity-cpu-predictor.default.svc.cluster.local
            port:
              number: 80
