# PVC for the Triton model repository (config.pbtxt + version/model.onnx).
#
# Mirrors serving/gpu/model-pvc.yaml. RWO is intentional and sufficient:
# the CPU cluster is a single-node k3s, so all predictor pods land on the
# same node and can share the RWO mount.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-cpu-model-repo
  namespace: default
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path   # k3s default
  resources:
    requests:
      storage: 1Gi
