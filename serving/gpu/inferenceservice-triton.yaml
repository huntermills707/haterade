# KServe InferenceService: DistilBERT toxicity classifier on Triton + TensorRT.
#
# Topology: PVC (model.plan) -> Triton (predictor) -> KServe V2 protocol.
# RawDeployment mode + KEDA annotations give us scale-to-zero.
#
# Two KEDA triggers (OR semantics: scale if EITHER fires):
#   1. Triton queue depth   — primary signal for a batched inference server
#   2. DCGM GPU utilization — backup signal that catches GPU saturation
#
# Known gap: this predictor takes pre-tokenized input_ids/attention_mask.
# A KServe transformer (raw text -> tokens -> predictor) is the next milestone
# and is required before the forum-API story works end-to-end.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: toxicity-gpu
  namespace: default
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/autoscalerClass: keda
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 2
    containers:
      - name: kserve-container
        image: nvcr.io/nvidia/tritonserver:23.05-py3
        imagePullPolicy: IfNotPresent
        command: ["tritonserver"]
        args:
          - --model-repository=/mnt/models
          - --http-port=8080
          - --grpc-port=9000
          - --metrics-port=8002
          - --allow-grpc=true
          - --allow-http=true
          - --allow-metrics=true
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
            nvidia.com/gpu: 1
          limits:
            cpu: "4"
            memory: 8Gi
            nvidia.com/gpu: 1
        ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          - containerPort: 9000
            name: grpc
            protocol: TCP
          - containerPort: 8002
            name: metrics
            protocol: TCP
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
          - name: model-repo
            mountPath: /mnt/models
            readOnly: true
    volumes:
      - name: model-repo
        persistentVolumeClaim:
          claimName: triton-model-repo
    # nodeSelector-only, no taint. This cluster is single-node, so a
    # NoSchedule taint on the GPU node would also block system pods (Prometheus,
    # MLflow, Istio, GPU Operator itself) from scheduling. Revisit only if the
    # GPU cluster grows to multiple nodes with a dedicated GPU node pool.
    # See docs/adr/0001-use-kind-for-cpu-and-k3s-for-gpu.md (Node taint policy).
    nodeSelector:
      nvidia.com/gpu.present: "true"
  autoScaling:
    metrics:
      # Trigger 1 — Triton inference queue duration per pod (microseconds/s).
      # When average queue pressure per pod exceeds 50ms/s, KEDA scales up.
      - type: External
        external:
          metric:
            backend: prometheus
            serverAddress: http://kube-prometheus-stack-prometheus.observability.svc:9090
            query: >
              avg(rate(nv_inference_queue_duration_us{model="distilbert-toxicity"}[30s]))
          target:
            type: Value
            value: "50000"
      # Trigger 2 — DCGM GPU utilization (instantaneous %).
      # Scales out when the GPU is consistently saturated above 70%.
      - type: External
        external:
          metric:
            backend: prometheus
            serverAddress: http://kube-prometheus-stack-prometheus.observability.svc:9090
            # Filter to GPUs running our pods via the namespace label exported
            # by DCGM (GPU Operator >= v23). Verify label name in production.
            query: >
              avg_over_time(DCGM_FI_DEV_GPU_UTIL{Namespace="default"}[60s])
          target:
            type: Value
            value: "70"
