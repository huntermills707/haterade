# ServiceMonitor so kube-prometheus-stack scrapes Triton's metrics endpoint.
# Without this, the KEDA PromQL queries against nv_inference_queue_duration_us
# in inferenceservice-triton.yaml return empty results and KEDA never scales.
#
# Requires the 'metrics' named port (8002) declared on the predictor container
# in the InferenceService, which it is.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: triton-metrics
  namespace: default
  labels:
    release: kube-prometheus-stack   # matched by kube-prometheus-stack discovery
spec:
  selector:
    # KServe creates the predictor Service with this label set.
    matchLabels:
      serving.kserve.io/inferenceservice: toxicity-gpu
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
