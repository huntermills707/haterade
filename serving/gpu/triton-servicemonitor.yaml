# ServiceMonitor so kube-prometheus-stack scrapes Triton's metrics endpoint.
# Without this, the KEDA PromQL queries against nv_inference_queue_duration_us
# return empty results and KEDA never scales.
#
# Selects the stable/canary Services created by the Argo Rollout (M4).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: triton-metrics
  namespace: default
  labels:
    release: kube-prometheus-stack   # matched by kube-prometheus-stack discovery
spec:
  selector:
    matchLabels:
      app: toxicity-gpu
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
