# KServe storage-initializer Secret for pulling model artifacts from MinIO.
#
# KServe v0.19's storage-initializer reads this Secret (named storage-config)
# in the namespace of each InferenceService. The `storage.key` field on an
# ISVC's storage block selects which JSON blob under data to use; the
# matching JSON contains the S3 provider config (type, endpoint, creds,
# bucket).
#
# ISVC usage:
#   storage:
#     key: localMinio          # ← matches a key in this Secret
#     path: mlflow/1/<run_id>/artifacts/model
#
# Credentials mirror the MinIO helm release values in
# infra/install-platform-stack.sh (rootUser=rootPassword=minioadmin).
# If those values are ever changed there, change them here too.
#
# Lives in `default` to match serving/gpu/model-pvc.yaml's convention.
# If ISVCs ever live in a dedicated `serving` ns, duplicate this Secret
# there or use a namespace-scoped copy.
#
# Applied by infra/install-platform-stack.sh right after MinIO is ready.
apiVersion: v1
kind: Secret
metadata:
  name: storage-config
  namespace: default
  labels: {app: kserve-storage, component: minio}
  annotations:
    description: "S3 provider configs for KServe storage-initializer → MinIO"
type: Opaque
stringData:
  # One JSON blob per named storage provider. The ISVC `storage.key`
  # field selects which one. Names are arbitrary; convention is camelCase.
  localMinio: |
    {
      "type": "s3",
      "access_key_id": "minioadmin",
      "secret_access_key": "minioadmin",
      "endpoint_url": "http://minio.mlflow.svc.cluster.local:9000",
      "bucket": "mlflow",
      "verify_ssl": "false"
    }
